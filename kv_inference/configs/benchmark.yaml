model:
  name: Qwen/Qwen2.5-7B-Instruct
  dtype: float16
  max_model_len: 4096

benchmark:
  device: cuda
  warmup_iters: 5
  measure_iters: 20
  batch_sizes: [1, 2, 4, 8]
  input_lengths: [32, 128, 512]
  output_lengths: [32, 128]
  prompts_path: configs/prompts.txt
  seed: 42

vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9
  max_num_seqs: 32
  enforce_eager: false

hf:
  use_cache: true
  attn_implementation: sdpa
